<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/css.css">
    <title>타임리프 자체 태그</title>
</head>
<body>
    <h2>타임리프 자체 태그</h2>
    <div>
        <!-- 특정 태그의 도움없이 thymeleaf를 사용하고 싶을 때 -->
        <th:block th:each="user : ${users}">
            <span th:text="${user.username}"></span>
            <span th:text="${user.age}"></span>
        </th:block>
    </div>
</body>
</html>
