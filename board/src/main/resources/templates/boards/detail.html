<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>detail</title>
    <link rel="stylesheet" href="/css.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/boards">게시판</a>
    </header>
    <div class="container">
        <div class="card">
            <h1 th:text="${board.title}">제목</h1>
            <div class="post-meta">
                작성자
                <Strong><span th:text="${board.writer}"></span></Strong>
                ・
                조회
                <Strong><span th:text="${board.viewCount}"></span></Strong>
                ・
                <span th:text="${board.createAt}"></span>
            </div>
            <div class="original-label">
                <p>내용</p>
            </div>
            <div class="post-content">
                <p th:text="${board.content}">내용</p>
            </div>
            <div class="button-row">
                <a href="/boards" class="btn gray">목록</a>
                <a th:href="@{/boards/{id}/edit(id=${board.id})}" class="btn blue">수정</a>
                <form th:action="@{/boards/delete/{id}(id=${board.id})}" method="POST">
                    <button type="submit" onclick="return confirm('정말 삭제하시겠습니까?');" class="btn danger">삭제</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
